apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: default
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: mlflow:v3.10.1
        imagePullPolicy: IfNotPresent
        command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--allowed-hosts", "mlflow,mlflow:5000,mlflow.default,mlflow.default:5000,mlflow.default.svc,mlflow.default.svc:5000,mlflow.default.svc.cluster.local,mlflow.default.svc.cluster.local:5000,mlflow.localhost,mlflow.localhost:80,localhost,localhost:5000"]
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: mlflow-data
          mountPath: /mlflow
      volumes:
      - name: mlflow-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: default
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlflow
  namespace: default
  labels:
    app: mlflow
spec:
  ingressClassName: nginx
  rules:
  - host: mlflow.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mlflow
            port:
              number: 5000
