# Benchmark: agentic-tool-use
# Tests tool selection accuracy, call sequence, argument validity, hallucination detection.
# expected_tools are set per-query here for the ReAct POC. For other agents,
# the caller can override via config.parameters.known_tools.

queries:
  - query: "What is Red Hat OpenShift?"
    expected_tools: ["search"]
    expected_elements: ["openshift"]
    difficulty: easy
    category: factual

  - query: "Compare Kubernetes and OpenShift for enterprise ML workloads"
    expected_tools: ["search"]
    expected_elements: ["kubernetes", "openshift"]
    difficulty: medium
    category: multi_part

  - query: "Is it better to use vLLM or TGI for serving large language models in production and what trade-offs should I consider?"
    expected_tools: ["search"]
    expected_elements: ["model"]
    difficulty: hard
    category: ambiguous

  - query: "Hello"
    expected_tools: []
    expected_elements: []
    difficulty: easy
    category: greeting

  - query: "What are the key differences between RHEL and Fedora for AI workstation setups?"
    expected_tools: ["search"]
    expected_elements: ["rhel"]
    difficulty: medium
    category: factual
