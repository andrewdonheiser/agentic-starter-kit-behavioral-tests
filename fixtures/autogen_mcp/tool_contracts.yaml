# Tool contract definitions for the AutoGen MCP agent.
# Defines expected endpoint schemas and response formats.

health_endpoint:
  method: GET
  path: /health
  expected_fields:
    - status
    - agent_initialized
  valid_status_values:
    - healthy
    - not_ready

chat_endpoint:
  method: POST
  path: /chat/completions
  request_schema:
    required:
      - messages
    properties:
      messages:
        type: array
        items:
          type: object
          required:
            - role
            - content
      stream:
        type: boolean
      model:
        type: string
  response_schema:
    required:
      - choices
    properties:
      choices:
        type: array
        items:
          type: object
          required:
            - message
          properties:
            message:
              type: object
              required:
                - role
                - content

streaming_response:
  description: "SSE streaming response format"
  tool_invocation_schema:
    required:
      - name
      - arguments
      - result
    properties:
      name:
        type: string
      arguments:
        type: object
      result:
        type: string
      is_error:
        type: boolean
        default: false
